[Rainmeter]
Update=16
DefaultUpdateDivider=62
DynamicWindowSize=1
AccurateText=1
BackgroundMode=1
SolidColor=0,0,0,1
OnRefreshAction=[!Hide][!CommandMeasure MeasureFetchPython "Run"]

[Variables]
ImgWidth=250
TotalFrames=1
AnimDivider=6
ImgHeight=250
DoodleURL=
DoodleTitle=
DoodleLink=

; ── 0. MIDNIGHT AUTO-REFRESH ─────────────────────────────────────────────────

[MeasureNewDay]
Measure=Time
Format=%j
UpdateDivider=62
OnChangeAction=[!Refresh]

; ── 1. MAIN LOGIC ────────────────────────────────────────────────────────────

[MeasureYear]
Measure=Time
Format=%Y

[MeasureMonth]
Measure=Time
Format=%m
RegExpSubstitute=1
Substitute="^0":""

[MeasureFetchPython]
Measure=Plugin
Plugin=RunCommand
Program=cmd.exe
Parameter=/c python "#CURRENTPATH#FetchDoodle.py" "#ImgWidth#"
State=Hide
OutputType=ANSI
Timeout=30000
FinishAction=[!Log "Python fetch done"][!UpdateMeasure MeasureFrames][!UpdateMeasure MeasureSpeedSplit][!UpdateMeasure MeasureHeightSplit][!SetVariable TotalFrames "[MeasureFrames]"][!SetVariable AnimDivider "[MeasureSpeedSplit]"][!SetVariable ImgHeight "[MeasureHeightSplit]"][!SetOption MeterAnimation ImageName "#CURRENTPATH#DownloadFile\sprite.png"][!SetOption MeterAnimation W "#ImgWidth#"][!SetOption MeterAnimation H "[MeasureHeightSplit]"][!SetOption MeterImageContainer Shape "Rectangle 2, 2, (#ImgWidth#-4), [MeasureHeightSplit], 10 | Fill Color 255,255,255,255 | StrokeWidth 0"][!SetOption MeterFrameBackground Shape "Rectangle 1, 1, (#ImgWidth#-2), ([MeasureHeightSplit]+4-2), 12 | Fill Color 0,0,0,255 | StrokeWidth 2 | Stroke Color 0,0,0,255"][!EnableMeasure MeasureReadTitle][!CommandMeasure MeasureReadTitle "Update"]

[MeasureReadTitle]
Measure=WebParser
URL=file://#CURRENTPATH#DownloadFile\title.txt
UpdateRate=0
RegExp=(?si)^(.*)$
StringIndex=1
Disabled=1
FinishAction=[!Log "Title read finished"][!SetVariable DoodleTitle "[MeasureReadTitle]"][!EnableMeasure MeasureReadLink][!CommandMeasure MeasureReadLink "Update"]
OnConnectErrorAction=[!Log "WebParser ERROR: title file not found"]
OnRegExpErrorAction=[!Log "WebParser ERROR: regex failed"]

[MeasureReadLink]
Measure=WebParser
URL=file://#CURRENTPATH#DownloadFile\link.txt
UpdateRate=0
RegExp=(?si)^(.*)$
StringIndex=1
Disabled=1
FinishAction=[!Log "Link read finished"][!SetVariable DoodleLink "[MeasureReadLink]"][!UpdateMeter *][!Show][!Redraw]
OnConnectErrorAction=[!Log "WebParser ERROR: link file not found"]
OnRegExpErrorAction=[!Log "WebParser ERROR: regex failed"]

; ── 2. DATA SPLITTERS ────────────────────────────────────────────────────────

[MeasureFrames]
Measure=String
String=[MeasureFetchPython]
DynamicVariables=1
RegExpSubstitute=1
Substitute="\n":"","\r":"","^(.+)\|(.+)\|(.+)$":"\1","^[a-zA-Z].*$":"1","^$":"1"

[MeasureSpeedSplit]
Measure=String
String=[MeasureFetchPython]
DynamicVariables=1
RegExpSubstitute=1
Substitute="\n":"","\r":"","^(.+)\|(.+)\|(.+)$":"\2","^[a-zA-Z].*$":"6","^$":"6"

[MeasureHeightSplit]
Measure=String
String=[MeasureFetchPython]
DynamicVariables=1
RegExpSubstitute=1
Substitute="\n":"","\r":"","^(.+)\|(.+)\|(.+)$":"\3","^[a-zA-Z].*$":"250","^$":"250"

; ── 3. GRID ANIMATION MATH ──────────────────────────────────────────────────

[MeasureAnimationFrame]
Measure=Calc
Formula=(MeasureAnimationFrame + 1) % #TotalFrames#
DynamicVariables=1
UpdateDivider=#AnimDivider#

[MeasureCropY]
Measure=Calc
Formula=(MeasureAnimationFrame * #ImgHeight#)
DynamicVariables=1
UpdateDivider=#AnimDivider#
OnChangeAction=[!SetOption MeterAnimation ImageCrop "0,[MeasureCropY],#ImgWidth#,#ImgHeight#"][!UpdateMeter MeterAnimation][!Redraw]



; ── 4. METERS ────────────────────────────────────────────────────────────────

[MeterFrameBackground]
Meter=Shape
Shape=Rectangle 1, 1, (#ImgWidth#-2), (#ImgHeight#+4-2), 12 | Fill Color 0,0,0,255 | StrokeWidth 2 | Stroke Color 0,0,0,255
DynamicVariables=1
UpdateDivider=62

[MeterImageContainer]
Meter=Shape
Shape=Rectangle 2, 2, (#ImgWidth#-4), #ImgHeight#, 10 | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1
UpdateDivider=62

[MeterAnimation]
Meter=Image
X=2
Y=2
Container=MeterImageContainer
UpdateDivider=-1