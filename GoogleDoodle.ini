[Rainmeter]
; NOTE: To lower the framerate (e.g. to 32 or 64), you MUST change BOTH the Update= value below AND the SkinUpdate= value in the [Variables] section! Rainmeter does not support variables in this section.
Update=16
DefaultUpdateDivider=62
DynamicWindowSize=1
AccurateText=1
BackgroundMode=1
SolidColor=0,0,0,1
OnRefreshAction=[!Hide][!CommandMeasure MeasureFetchPython "Run"]

[Variables]
SkinUpdate=16
ImgWidth=250
TotalFrames=17
AnimDelayMs=66.67
AnimOptimalDivider=4
ImgHeight=100
DoodleURL=
DoodleTitle=
DoodleLink=

; ── 0. MIDNIGHT AUTO-REFRESH ─────────────────────────────────────────────────

[MeasureNewDay]
Measure=Time
Format=%j
UpdateDivider=62
OnChangeAction=[!Refresh]

; ── 1. MAIN LOGIC ────────────────────────────────────────────────────────────

[MeasureYear]
Measure=Time
Format=%Y

[MeasureMonth]
Measure=Time
Format=%m
RegExpSubstitute=1
Substitute="^0":""

[MeasureFetchPython]
Measure=Plugin
Plugin=RunCommand
Program=cmd.exe
Parameter=/c python "#CURRENTPATH#FetchDoodle.py" "#ImgWidth#" "#SkinUpdate#"
State=Hide
OutputType=ANSI
Timeout=30000
FinishAction=[!Log "Python fetch done"][!UpdateMeasure MeasureFrames][!UpdateMeasure MeasureDelaySplit][!UpdateMeasure MeasureHeightSplit][!UpdateMeasure MeasureDividerSplit][!SetVariable TotalFrames "[MeasureFrames]"][!SetVariable AnimDelayMs "[MeasureDelaySplit]"][!SetVariable ImgHeight "[MeasureHeightSplit]"][!SetVariable AnimOptimalDivider "[MeasureDividerSplit]"][!SetOption MeterAnimation BitmapFrames "[MeasureFrames]"][!SetOption MeterAnimation BitmapImage "#CURRENTPATH#DownloadFile\sprite.png"][!SetOption MeterAnimation UpdateDivider "[MeasureDividerSplit]"][!SetOption MeterImageContainer Shape "Rectangle 2, 2, (#ImgWidth#-4), [MeasureHeightSplit], 10 | Fill Color 255,255,255,255 | StrokeWidth 0"][!SetOption MeterFrameBackground Shape "Rectangle 1, 1, (#ImgWidth#-2), ([MeasureHeightSplit]+4-2), 12 | Fill Color 0,0,0,255 | StrokeWidth 2 | Stroke Color 0,0,0,255"][!EnableMeasure MeasureReadTitle][!CommandMeasure MeasureReadTitle "Update"]

[MeasureReadTitle]
Measure=WebParser
URL=file://#CURRENTPATH#DownloadFile\title.txt
UpdateRate=0
RegExp=(?si)^(.*)$
StringIndex=1
Disabled=1
FinishAction=[!Log "Title read finished"][!SetVariable DoodleTitle "[MeasureReadTitle]"][!SetOption MeterAnimation ToolTipText "[MeasureReadTitle]"][!EnableMeasure MeasureReadLink][!CommandMeasure MeasureReadLink "Update"][!DisableMeasure MeasureReadTitle]
OnConnectErrorAction=[!Log "WebParser ERROR: title file not found"]
OnRegExpErrorAction=[!Log "WebParser ERROR: regex failed"]

[MeasureReadLink]
Measure=WebParser
URL=file://#CURRENTPATH#DownloadFile\link.txt
UpdateRate=0
RegExp=(?si)^(.*)$
StringIndex=1
Disabled=1
FinishAction=[!Log "Link read finished"][!SetVariable DoodleLink "[MeasureReadLink]"][!SetOption MeterAnimation LeftMouseUpAction """["[MeasureReadLink]"]"""][!UpdateMeter *][!Show][!Redraw][!DisableMeasure MeasureReadLink]
OnConnectErrorAction=[!Log "WebParser ERROR: link file not found"]
OnRegExpErrorAction=[!Log "WebParser ERROR: regex failed"]

; ── 2. DATA SPLITTERS ────────────────────────────────────────────────────────

[MeasureFrames]
Measure=String
String=[MeasureFetchPython]
DynamicVariables=1
RegExpSubstitute=1
Substitute="\n":"","\r":"","^(.+)\|(.+)\|(.+)\|(.+)$":"\1","^[a-zA-Z].*$":"1","^$":"1"

[MeasureDelaySplit]
Measure=String
String=[MeasureFetchPython]
DynamicVariables=1
RegExpSubstitute=1
Substitute="\n":"","\r":"","^(.+)\|(.+)\|(.+)\|(.+)$":"\2","^[a-zA-Z].*$":"100","^$":"100"

[MeasureHeightSplit]
Measure=String
String=[MeasureFetchPython]
DynamicVariables=1
RegExpSubstitute=1
Substitute="\n":"","\r":"","^(.+)\|(.+)\|(.+)\|(.+)$":"\3","^[a-zA-Z].*$":"250","^$":"250"

[MeasureDividerSplit]
Measure=String
String=[MeasureFetchPython]
DynamicVariables=1
RegExpSubstitute=1
Substitute="\n":"","\r":"","^(.+)\|(.+)\|(.+)\|(.+)$":"\4","^[a-zA-Z].*$":"1","^$":"1"

; ── 3. GRID ANIMATION MATH ──────────────────────────────────────────────────

[MeasureTicks]
Measure=Calc
Formula=MeasureTicks + 1
UpdateDivider=#AnimOptimalDivider#
DynamicVariables=1

[MeasureAnimationFrame]
Measure=Calc
Formula=Trunc((MeasureTicks * #SkinUpdate# * #AnimOptimalDivider#) / #AnimDelayMs#) % #TotalFrames#
DynamicVariables=1
UpdateDivider=#AnimOptimalDivider#
OnChangeAction=[!UpdateMeasure MeasureFrameChanges]

; ── 3.5 RUNTIME PROFILER ─────────────────────────────────────────────────────

[MeasureFrameChanges]
Measure=Calc
Formula=MeasureFrameChanges + 1
DynamicVariables=1
UpdateDivider=-1

[MeasureNativeFPS]
Measure=Calc
Formula=Round(1000 / #AnimDelayMs#)
DynamicVariables=1
UpdateDivider=-1

[MeasureActualFPS]
Measure=Calc
Formula=Round(MeasureFrameChanges / 5)
DynamicVariables=1
UpdateDivider=-1

[MeasureProfilerTimer]
Measure=Calc
Formula=(MeasureProfilerTimer + 1)
UpdateDivider=(Round(5000 / #SkinUpdate#))
DynamicVariables=1
OnChangeAction=[!UpdateMeasure MeasureNativeFPS][!UpdateMeasure MeasureActualFPS][!Log "PROFILER -> GIF Native: [MeasureNativeFPS] FPS | Target SkinUpdate: #SkinUpdate#ms | Actual Render Rate: [MeasureActualFPS] FPS"][!SetOption MeasureFrameChanges Formula "0"][!UpdateMeasure MeasureFrameChanges][!SetOption MeasureFrameChanges Formula "MeasureFrameChanges + 1"]



; ── 4. METERS ────────────────────────────────────────────────────────────────

[MeterFrameBackground]
Meter=Shape
Shape=Rectangle 1, 1, (#ImgWidth#-2), (#ImgHeight#+4-2), 12 | Fill Color 0,0,0,255 | StrokeWidth 2 | Stroke Color 0,0,0,255
DynamicVariables=1
UpdateDivider=62

[MeterImageContainer]
Meter=Shape
Shape=Rectangle 2, 2, (#ImgWidth#-4), #ImgHeight#, 10 | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1
UpdateDivider=62

[MeterAnimation]
Meter=Bitmap
MeasureName=MeasureAnimationFrame
BitmapImage=#CURRENTPATH#DownloadFile\sprite.png
BitmapFrames=#TotalFrames#
BitmapExtend=1
X=2
Y=2
Container=MeterImageContainer
ToolTipType=1
UpdateDivider=#AnimOptimalDivider#